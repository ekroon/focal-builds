name: Build Neovim for Ubuntu 20.04

on:
  workflow_dispatch:
    inputs:
      version:
        description: Neovim tag to build, for example v0.12.2
        required: true
        type: string
  schedule:
    - cron: "17 6 * * *"

permissions:
  contents: write

env:
  TOOL: neovim
  ASSET_NAME: nvim-linux-x86_64.tar.gz
  PACKAGE_ROOT: nvim-linux-x86_64

jobs:
  resolve:
    name: Resolve version
    runs-on: ubuntu-latest

    outputs:
      exists: ${{ steps.version.outputs.exists }}
      release_tag: ${{ steps.version.outputs.release_tag }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Resolve version
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          if [ -n "${INPUT_VERSION}" ]; then
            version="${INPUT_VERSION}"
          else
            version="$(gh api repos/neovim/neovim/releases/latest --jq .tag_name)"
          fi

          case "${version}" in
            v*) ;;
            *)
              echo "::error::Version must be a Neovim tag like v0.12.2"
              exit 1
              ;;
          esac

          release_tag="${TOOL}-${version}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "release_tag=${release_tag}" >> "${GITHUB_OUTPUT}"

          if gh release view "${release_tag}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "exists=true" >> "${GITHUB_OUTPUT}"
            echo "Release ${release_tag} already exists; skipping build."
          else
            echo "exists=false" >> "${GITHUB_OUTPUT}"
          fi

  build:
    name: Build Neovim
    needs: resolve
    if: needs.resolve.outputs.exists == 'false'
    runs-on: ubuntu-latest
    container:
      image: ubuntu:20.04

    steps:
      - name: Install build dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          set -euo pipefail
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            curl \
            gettext \
            git \
            ninja-build \
            pkg-config \
            ca-certificates \
            unzip

      - name: Clone Neovim
        run: |
          set -euo pipefail
          git clone --filter=blob:none --branch "${{ needs.resolve.outputs.version }}" \
            https://github.com/neovim/neovim.git neovim

      - name: Build and install Neovim
        run: |
          set -euo pipefail
          make -C neovim CMAKE_BUILD_TYPE=Release CMAKE_INSTALL_PREFIX="${PWD}/package/${PACKAGE_ROOT}" install

      - name: Package archive
        run: |
          set -euo pipefail
          test -x "package/${PACKAGE_ROOT}/bin/nvim"
          "package/${PACKAGE_ROOT}/bin/nvim" --version
          tar -czf "${ASSET_NAME}" -C package "${PACKAGE_ROOT}"
          tar -tzf "${ASSET_NAME}" | grep -qx "${PACKAGE_ROOT}/bin/nvim"

      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ASSET_NAME }}
          path: ${{ env.ASSET_NAME }}
          if-no-files-found: error

  release:
    name: Publish release
    needs:
      - resolve
      - build
    if: needs.resolve.outputs.exists == 'false'
    runs-on: ubuntu-latest

    steps:
      - name: Download archive
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.ASSET_NAME }}

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.resolve.outputs.version }}
          RELEASE_TAG: ${{ needs.resolve.outputs.release_tag }}
        run: |
          set -euo pipefail
          gh release create "${RELEASE_TAG}" "${ASSET_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "Neovim ${VERSION} for Ubuntu 20.04" \
            --notes "Built from neovim/neovim ${VERSION} on Ubuntu 20.04 for glibc 2.31 compatibility."
